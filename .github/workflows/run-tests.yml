name: API Automated Tests (Newman)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 6 * * 1-5'
    - cron: '0 8 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '0 18 * * 1-5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  api-testing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Installation de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Installation des dépendances (Newman + Reporter HTML)
      run: npm install

    # ÉTAPE MODIFIÉE : On lance notre orchestrateur JS qui centralise tout
    - name: Exécution de la suite de tests globale
      run: npm run test-all

    # ÉTAPE OPTIMISÉE : Sauvegarde du rapport global unique, même en cas d'échec
    - name: Sauvegarde du rapport HTML Global
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: newman-global-html-report
        path: reports/global-report.html
        retention-days: 5